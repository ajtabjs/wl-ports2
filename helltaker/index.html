<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Helltaker</title>
    <link rel="canonical" href="https://kbhgames.com/game/helltaker">
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600&display=swap" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        background: #02021C;
        overflow: hidden;
        width: 100vw;
        height: 100vh;
        touch-action: none;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
      }

      #unity-container {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #02021C;
        position: relative;
      }

      #unity-canvas {
        background: #02021C;
        display: none;
      }

      /* ---- Canonical Loader Screen ---- */
      #loader-screen {
        position: fixed;
        inset: 0;
        background: #000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 50;
        font-family: 'Figtree', Arial, sans-serif;
        gap: 0;
      }

      #loader-screen h1 {
        color: #fff;
        font-size: 1.4rem;
        font-weight: 600;
        margin-bottom: 20px;
        letter-spacing: 0.03em;
      }

      #loader-screen img {
        margin-bottom: 24px;
        image-rendering: pixelated;
      }

      .file-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 8px;
        font-size: 0.95rem;
      }

      .file-name {
        color: #ff8fab;
        font-weight: 600;
        min-width: 130px;
        text-align: right;
      }

      .file-status {
        color: #90caf9;
        min-width: 120px;
      }

      .file-status.pending {
        color: #555;
      }

      /* Suppress merge.js built-in overlay */
      #file-merger-loading { display: none !important; }

      #unity-warning {
        position: absolute;
        left: 50%;
        top: 5%;
        transform: translate(-50%);
        background: #1a0a10;
        padding: 10px 20px;
        display: none;
        color: #e63946;
        font-family: 'Figtree', Arial, sans-serif;
        border-radius: 4px;
        border: 1px solid #2a1520;
      }

      /* Mobile Touch Controls */
      #touch-controls {
        display: none;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        pointer-events: none;
        z-index: 100;
        padding: 0 12px 16px;
      }
      #touch-controls.visible {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
      }

      .dpad {
        pointer-events: none;
        display: grid;
        grid-template-columns: 56px 56px 56px;
        grid-template-rows: 56px 56px 56px;
        gap: 4px;
      }
      .action-cluster {
        pointer-events: none;
        display: grid;
        grid-template-columns: 56px 56px;
        grid-template-rows: 56px 56px;
        gap: 6px;
      }

      .touch-btn {
        pointer-events: auto;
        width: 56px; height: 56px;
        border-radius: 14px;
        border: 2px solid rgba(230,57,70,0.3);
        background: rgba(10,5,15,0.6);
        backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
        display: flex; align-items: center; justify-content: center;
        color: rgba(255,255,255,0.55);
        font-size: 20px;
        -webkit-tap-highlight-color: transparent;
        transition: background 0.08s, border-color 0.08s, transform 0.08s;
      }
      .touch-btn:active, .touch-btn.pressed {
        background: rgba(230,57,70,0.4);
        border-color: rgba(230,57,70,0.9);
        color: #fff;
        transform: scale(0.92);
      }
      .touch-btn svg { width: 22px; height: 22px; fill: currentColor; }
      .touch-btn.accent { border-color: rgba(230,57,70,0.5); color: rgba(230,57,70,0.7); }
      .touch-btn.accent:active, .touch-btn.accent.pressed { color: #e63946; }

      .dpad-empty { pointer-events: none; }
      #btn-up    { grid-column: 2; grid-row: 1; }
      #btn-left  { grid-column: 1; grid-row: 2; }
      #btn-right { grid-column: 3; grid-row: 2; }
      #btn-down  { grid-column: 2; grid-row: 3; }
      #btn-submit  { grid-column: 2; grid-row: 1 / 3; border-radius: 16px; font-size: 28px; }
      #btn-restart { grid-column: 1; grid-row: 1; }
      #btn-pause   { grid-column: 1; grid-row: 2; }

      .touch-label {
        font-family: 'Figtree', Arial, sans-serif;
        font-size: 9px; letter-spacing: 1px; text-transform: uppercase;
        color: rgba(255,255,255,0.2); text-align: center;
        margin-top: 6px; pointer-events: none;
      }

      @media (min-width: 900px) and (hover: hover) and (pointer: fine) {
        #touch-controls { display: none !important; }
      }
      @media (max-width: 380px) {
        .dpad, .action-cluster { gap: 2px; }
        .touch-btn { width: 48px; height: 48px; font-size: 18px; }
        .dpad { grid-template-columns: 48px 48px 48px; grid-template-rows: 48px 48px 48px; }
        .action-cluster { grid-template-columns: 48px 48px; grid-template-rows: 48px 48px; }
      }
    </style>
  </head>
  <body>

    <!-- Canonical loader screen -->
    <div id="loader-screen">
      <h1>~ loading... :3 ~</h1>
      <img src="../ritsu.gif" alt="ritsu" width="200" height="200" style="margin-bottom: 24px;">
      <div class="file-row">
        <span class="file-name">build.data:</span>
        <span class="file-status pending" id="status-data">waiting...</span>
      </div>
      <div class="file-row">
        <span class="file-name">build.wasm:</span>
        <span class="file-status pending" id="status-wasm">waiting...</span>
      </div>
    </div>

    <div id="unity-container">
      <canvas id="unity-canvas" tabindex="-1"></canvas>
      <div id="unity-warning"> </div>
    </div>

    <!-- Mobile Touch Controls -->
    <div id="touch-controls">
      <div>
        <div class="dpad">
          <div class="dpad-empty"></div>
          <div id="btn-up" class="touch-btn" data-key="ArrowUp" data-keycode="38">
            <svg viewBox="0 0 24 24"><path d="M12 4l-8 8h5v8h6v-8h5z"/></svg>
          </div>
          <div class="dpad-empty"></div>
          <div id="btn-left" class="touch-btn" data-key="ArrowLeft" data-keycode="37">
            <svg viewBox="0 0 24 24"><path d="M4 12l8-8v5h8v6h-8v5z"/></svg>
          </div>
          <div class="dpad-empty"></div>
          <div id="btn-right" class="touch-btn" data-key="ArrowRight" data-keycode="39">
            <svg viewBox="0 0 24 24"><path d="M20 12l-8 8v-5H4v-6h8V4z"/></svg>
          </div>
          <div class="dpad-empty"></div>
          <div id="btn-down" class="touch-btn" data-key="ArrowDown" data-keycode="40">
            <svg viewBox="0 0 24 24"><path d="M12 20l8-8h-5V4h-6v8H4z"/></svg>
          </div>
          <div class="dpad-empty"></div>
        </div>
        <div class="touch-label">MOVE</div>
      </div>
      <div>
        <div class="action-cluster">
          <div id="btn-restart" class="touch-btn" data-key="r" data-keycode="82">
            <svg viewBox="0 0 24 24"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
          </div>
          <div id="btn-submit" class="touch-btn accent" data-key="Enter" data-keycode="13">
            <svg viewBox="0 0 24 24"><path d="M9 16.2L4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4z"/></svg>
          </div>
          <div id="btn-pause" class="touch-btn" data-key="Escape" data-keycode="27">
            <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
          </div>
        </div>
        <div class="touch-label">ACTION</div>
      </div>
    </div>

    <!-- 1. fileMergerConfig: WebGL_Build.data (3 parts), WebGL_Build.wasm (2 parts) -->
    <script>
      window.fileMergerConfig = {
        files: [
          { name: 'WebGL_Build.data', parts: 3 },
          { name: 'WebGL_Build.wasm', parts: 2 }
        ],
        basePath: 'Build/',
        debug: false
      };
    </script>

    <!-- 2. merge.js — registers fetch/XHR intercepts before Unity loader runs -->
    <script src="https://pub-db81a8cf9cd147f9a765ef1a1a5c57c7.r2.dev/BeepLighter/1776021104882-i0ebfhhldo.js"></script>

    <script>
      var canvas = document.querySelector("#unity-canvas");
      var warningBanner = document.querySelector("#unity-warning");

      var GAME_WIDTH = 960;
      var GAME_HEIGHT = 540;
      var ASPECT = GAME_WIDTH / GAME_HEIGHT;

      function resizeCanvas() {
        var w = window.innerWidth;
        var h = window.innerHeight;
        if (w / h > ASPECT) {
          canvas.style.height = h + "px";
          canvas.style.width = Math.floor(h * ASPECT) + "px";
        } else {
          canvas.style.width = w + "px";
          canvas.style.height = Math.floor(w / ASPECT) + "px";
        }
      }

      window.addEventListener("resize", resizeCanvas);
      resizeCanvas();

      function setStatus(id, text, done) {
        var el = document.getElementById(id);
        if (!el) return;
        el.textContent = text;
        el.classList.remove('pending');
        el.style.color = done ? '#00e676' : '#ffeb3b';
      }

      // Listen for merge.js progress events
      window.addEventListener('fileMergerProgress', function(e) {
        var d = e.detail;
        if (!d) return;
        var id = d.name === 'WebGL_Build.data' ? 'status-data' : 'status-wasm';
        if (d.done) {
          setStatus(id, 'done \u2713', true);
        } else {
          setStatus(id, 'merging... ' + d.loaded + '/' + d.total);
        }
      });

      // Kick off statuses immediately
      setStatus('status-data', 'merging... 0/3');
      setStatus('status-wasm', 'merging... 0/2');

      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: #3a0a10; padding: 10px; color: #e63946;';
        else {
          if (type == 'warning') div.style = 'background: #3a2010; padding: 10px; color: #e6a039;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      // 3. Dynamically load Unity loader AFTER merge.js intercepts are registered
      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/WebGL_Build.loader.js";
      var config = {
        dataUrl: buildUrl + "/WebGL_Build.data",
        frameworkUrl: buildUrl + "/WebGL_Build.framework.js",
        codeUrl: buildUrl + "/WebGL_Build.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "vanripper",
        productName: "Helltaker",
        productVersion: "ex1.1",
        showBanner: unityShowBanner,
      };

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = function() {
        createUnityInstance(canvas, config, function(progress) {
          // Unity boot progress (after merge) — optionally update a status
        }).then(function(unityInstance) {
          document.getElementById('loader-screen').style.display = 'none';
          canvas.style.display = 'block';
          resizeCanvas();
        }).catch(function(message) {
          document.getElementById('loader-screen').innerHTML =
            '<h1 style="color:#ff4444">Error loading game.<br><small style="font-size:0.9rem">' + message + '</small></h1>';
        });
      };
      document.body.appendChild(script);

      // ---- Mobile Touch Controls ----
      (function() {
        var isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        if (!isTouchDevice) return;

        var controls = document.getElementById('touch-controls');
        controls.classList.add('visible');

        var buttons = controls.querySelectorAll('.touch-btn');

        function sendKey(key, code, keyCode, down) {
          var evt = new KeyboardEvent(down ? 'keydown' : 'keyup', {
            key: key, code: code, keyCode: keyCode, which: keyCode,
            bubbles: true, cancelable: true
          });
          canvas.dispatchEvent(evt);
        }

        function getCode(key) {
          switch(key) {
            case 'ArrowUp': return 'ArrowUp';
            case 'ArrowDown': return 'ArrowDown';
            case 'ArrowLeft': return 'ArrowLeft';
            case 'ArrowRight': return 'ArrowRight';
            case 'Enter': return 'Enter';
            case 'Escape': return 'Escape';
            case 'r': return 'KeyR';
            default: return key;
          }
        }

        buttons.forEach(function(btn) {
          var key = btn.getAttribute('data-key');
          var keyCode = parseInt(btn.getAttribute('data-keycode'));
          var code = getCode(key);

          btn.addEventListener('touchstart', function(e) {
            e.preventDefault();
            btn.classList.add('pressed');
            sendKey(key, code, keyCode, true);
          }, { passive: false });

          btn.addEventListener('touchend', function(e) {
            e.preventDefault();
            btn.classList.remove('pressed');
            sendKey(key, code, keyCode, false);
          }, { passive: false });

          btn.addEventListener('touchcancel', function(e) {
            btn.classList.remove('pressed');
            sendKey(key, code, keyCode, false);
          });
        });

        document.addEventListener('touchmove', function(e) {
          e.preventDefault();
        }, { passive: false });
      })();
    </script>
  </body>
</html>
